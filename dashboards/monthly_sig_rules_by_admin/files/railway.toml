
[build]
builder = "nixpacks"
buildCommand = "pip install -r dashboards/monthly_sig_rules_by_admin/files/requirements.txt"

[deploy]
startCommand = "streamlit run dashboards/monthly_sig_rules_by_admin/files/monthly_sig_rules.py --server.port $PORT --server.address 0.0.0.0 --server.headless=true"
healthcheckPath = "/_stcore/health"
restartPolicyType = "on_failure"
